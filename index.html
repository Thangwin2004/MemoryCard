<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Outfit:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <title>Bộ Lạc Memory Match</title>
</head>

<body>
  <div id="app">
    <!-- Fullscreen Button Overlay -->
    <button id="fullscreen-btn" class="game-overlay-btn" title="Phóng to / Thu nhỏ">
      <svg viewBox="0 0 24 24">
        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
      </svg>
    </button>

    <!-- User Profile Widget Overlay -->
    <div id="user-profile" class="user-profile-widget" style="display: none;">
      <img id="user-avatar" class="user-profile-avatar" src="" alt="Avatar" />
      <div class="user-profile-info">
        <span id="user-name" class="user-profile-name">Guest</span>
        <span id="user-status" class="user-profile-status">Đã đăng nhập</span>
      </div>
    </div>

    <div id="pixi-container">Initializing Core Systems...</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
